
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blueprint Labs - SVG Previews</title>
    <style>
        :root {
            --sand-50:   #FDFAF5;
            --sand-100:  #F7F2E8;
            --sand-200:  #EDE6D6;
            --sand-300:  #DDD4BE;
            --ink-900:   #1A1814;
            --ink-700:   #3D3A34;
            --ink-400:   #7A7568;
            --ink-200:   #B8B2A4;
            --sage-500:  #6B7C6A;
            --amber-400: #C8922A;
            --charcoal:  #1C1C1A;
        }
        body {
            /* Using the dark theme so the light colors pop */
            background-color: var(--charcoal);
            color: var(--sand-50);
            font-family: 'Helvetica Neue', sans-serif;
            padding: 60px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--ink-700);
            border-radius: 8px;
            padding: 40px;
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        h3 {
            margin: 0;
            color: var(--sand-200);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h2>SVG Placeholder Previews</h2>

    <div class="card">
        <h3>01 Assess</h3>
        <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M60 10 L60 60" stroke="var(--ink-200)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M107 44 L60 60" stroke="var(--ink-200)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M89 100 L60 60" stroke="var(--ink-200)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M31 100 L60 60" stroke="var(--ink-200)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M13 44 L60 60" stroke="var(--ink-200)" stroke-width="1.5" stroke-linecap="round"/>
          <polygon points="60,10 107,44 89,100 31,100 13,44" stroke="var(--ink-200)" stroke-width="1" fill="none" opacity="0.5" stroke-dasharray="2 2"/>
          <polygon points="60,35 83,52 74,80 45,80 36,52" stroke="var(--ink-200)" stroke-width="1" fill="none" opacity="0.3"/>
          <polygon points="60,45 78,56 68,72 52,70 42,48" fill="var(--amber-400)" opacity="0.4" stroke="var(--amber-400)" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
    </div>

    <div class="card">
        <h3>02 Educate</h3>
        <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="25" width="100" height="14" rx="2" fill="var(--sand-200)" opacity="0.5"/>
          <rect x="10" y="53" width="100" height="14" rx="2" fill="var(--sand-200)" opacity="0.5"/>
          <rect x="10" y="81" width="100" height="14" rx="2" fill="var(--sand-200)" opacity="0.5"/>
          <rect x="10" y="25" width="40" height="14" rx="2" fill="var(--sage-500)"/>
          <rect x="10" y="53" width="65" height="14" rx="2" fill="var(--sage-500)"/>
          <rect x="10" y="81" width="85" height="14" rx="2" fill="var(--sage-500)"/>
        </svg>
    </div>

    <div class="card">
        <h3>03 Guide</h3>
        <svg width="160" height="60" viewBox="0 0 160 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 30 L130 30" stroke="var(--ink-200)" stroke-width="2" stroke-dasharray="4 4"/>
          <path d="M135 25 L142 30 L135 35" stroke="var(--ink-200)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="20" cy="30" r="10" fill="var(--sand-50)" stroke="var(--amber-400)" stroke-width="3"/>
          <circle cx="20" cy="30" r="4" fill="var(--amber-400)"/>
          <circle cx="60" cy="30" r="8" fill="var(--charcoal)" stroke="var(--ink-200)" stroke-width="2"/>
          <circle cx="100" cy="30" r="8" fill="var(--charcoal)" stroke="var(--ink-200)" stroke-width="2"/>
          <circle cx="140" cy="30" r="8" fill="var(--charcoal)" stroke="var(--ink-200)" stroke-width="2"/>
        </svg>
    </div>

    <div class="card">
        <h3>04 Build</h3>
        <svg width="120" height="150" viewBox="0 0 120 150" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="20" y="10" width="80" height="28" rx="4" fill="var(--charcoal)" stroke="var(--ink-400)" stroke-width="1.5"/>
          <text x="60" y="28" font-family="sans-serif" font-size="10" font-weight="bold" fill="var(--ink-200)" text-anchor="middle">INPUT</text>
          <path d="M60 38 L60 56" stroke="var(--amber-400)" stroke-width="2" stroke-linecap="round"/>
          <path d="M56 52 L60 58 L64 52" stroke="var(--amber-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="20" y="60" width="80" height="28" rx="4" fill="var(--charcoal)" stroke="var(--ink-400)" stroke-width="1.5"/>
          <text x="60" y="78" font-family="sans-serif" font-size="10" font-weight="bold" fill="var(--ink-200)" text-anchor="middle">AI AGENT</text>
          <path d="M60 88 L60 106" stroke="var(--amber-400)" stroke-width="2" stroke-linecap="round"/>
          <path d="M56 102 L60 108 L64 102" stroke="var(--amber-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="20" y="110" width="80" height="28" rx="4" fill="var(--charcoal)" stroke="var(--ink-400)" stroke-width="1.5"/>
          <text x="60" y="128" font-family="sans-serif" font-size="10" font-weight="bold" fill="var(--ink-200)" text-anchor="middle">OUTPUT</text>
        </svg>
    </div>

    <div class="card">
        <h3>05 Enable</h3>
        <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 90 L110 90" stroke="var(--ink-200)" stroke-width="1" opacity="0.4"/>
          <path d="M10 60 L110 60" stroke="var(--ink-200)" stroke-width="1" opacity="0.4"/>
          <path d="M10 30 L110 30" stroke="var(--ink-200)" stroke-width="1" opacity="0.4"/>
          <path d="M30 10 L30 110" stroke="var(--ink-200)" stroke-width="1" opacity="0.4"/>
          <path d="M60 10 L60 110" stroke="var(--ink-200)" stroke-width="1" opacity="0.4"/>
          <path d="M90 10 L90 110" stroke="var(--ink-200)" stroke-width="1" opacity="0.4"/>
          <path d="M20 95 Q 50 80 60 60 T 100 25" stroke="var(--sage-500)" stroke-width="3" stroke-linecap="round" fill="none"/>
          <circle cx="20" cy="95" r="4" fill="var(--amber-400)" stroke="var(--charcoal)" stroke-width="1.5"/>
          <circle cx="60" cy="60" r="4" fill="var(--amber-400)" stroke="var(--charcoal)" stroke-width="1.5"/>
          <circle cx="100" cy="25" r="4" fill="var(--amber-400)" stroke="var(--charcoal)" stroke-width="1.5"/>
        </svg>
    </div>

</body>
</html>
